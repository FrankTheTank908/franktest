name: iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: "Xcode scheme to build"
        required: true
        default: "NetProof"
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
      project_path:
        description: "Path to .xcodeproj (or .xcworkspace)"
        required: true
        default: "NetProof.xcodeproj"

jobs:
  build_unsigned_ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve project kind
        id: project_kind
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_PATH="${{ github.event.inputs.project_path }}"
          if [[ "$PROJECT_PATH" == *.xcworkspace ]]; then
            echo "xcode_container=-workspace" >> "$GITHUB_OUTPUT"
          elif [[ "$PROJECT_PATH" == *.xcodeproj ]]; then
            echo "xcode_container=-project" >> "$GITHUB_OUTPUT"
          else
            echo "project_path must end in .xcodeproj or .xcworkspace"
            exit 1
          fi

      - name: Archive app (code signing disabled)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild \
            "${{ steps.project_kind.outputs.xcode_container }}" "${{ github.event.inputs.project_path }}" \
            -scheme "${{ github.event.inputs.scheme }}" \
            -configuration "${{ github.event.inputs.configuration }}" \
            -sdk iphoneos \
            -archivePath "$PWD/build/NetProof.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Create unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH=$(find "$PWD/build/NetProof.xcarchive/Products/Applications" -maxdepth 1 -name "*.app" | head -n 1)
          if [[ -z "$APP_PATH" ]]; then
            echo "No .app found in archive"
            exit 1
          fi
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -r "$PWD/build/NetProof-unsigned.ipa" Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: build/NetProof-unsigned.ipa
          if-no-files-found: error
