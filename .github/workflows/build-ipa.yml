name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate app config (bundle id)
        env:
          APP_BUNDLE_ID: ${{ vars.APP_BUNDLE_ID }}
        run: ./scripts/generate-config.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          set -euo pipefail
          xcodebuild \
            -project MyFirstiOSApp.xcodeproj \
            -scheme MyFirstiOSApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos" -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built .app bundle"
            exit 1
          fi

          mkdir -p $RUNNER_TEMP/Payload
          cp -R "$APP_PATH" $RUNNER_TEMP/Payload/

          mkdir -p $RUNNER_TEMP/export
          (cd $RUNNER_TEMP && /usr/bin/zip -qry export/MyFirstiOSApp-unsigned.ipa Payload)

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyFirstiOSApp-unsigned-ipa
          path: ${{ runner.temp }}/export/MyFirstiOSApp-unsigned.ipa

      - name: Create GitHub release with unsigned IPA
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unsigned-build-${{ github.run_number }}
          name: Unsigned Build ${{ github.run_number }}
          files: ${{ runner.temp }}/export/MyFirstiOSApp-unsigned.ipa
