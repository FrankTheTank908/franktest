name: NetProof
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.netproof.app
    DEVELOPMENT_TEAM: ""

packages: {}

targets:
  NetProof:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NetProof
    info:
      path: NetProof/Resources/Info.plist
      properties:
        CFBundleName: NetProof
        CFBundleIdentifier: com.netproof.app
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_NAME: NetProof
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets:
        - NetProofTests

  NetProofTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NetProofTests
    dependencies:
      - target: NetProof
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netproof.app.tests
        GENERATE_INFOPLIST_FILE: YES
